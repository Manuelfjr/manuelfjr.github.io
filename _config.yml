locale: "en-US"
title: "Manuel Ferreira-Junior"
title_separator: " | "
subtitle:
name: "Manuel Ferreira-Junior"
description: "Machine Learning Engineer and Statistics researcher focused on clustering evaluation, item response theory, and practical AI systems."
url: "https://manuelfjr.github.io"
repository: "Manuelfjr/manuelfjr.github.io"
timezone: America/Fortaleza

minimal_mistakes_skin: "default"
logo:
teaser:
og_image: "https://avatars.githubusercontent.com/u/53409857?s=400&u=467cf21030038ff9b41db6d28783f125b12a6d73&v=4"
masthead_title: "Manuel Ferreira-Junior"
breadcrumbs: false
words_per_minute: 220
search: false
atom_feed:
  hide: true

comments:
  provider: false

twitter:
  username: "manuelfjr0"

social:
  type: Person
  name: "Manuel Ferreira-Junior"
  links:
    - "https://github.com/Manuelfjr"
    - "https://www.linkedin.com/in/manuefjr"

google_analytics: G-K8Q8D7HLYB
analytics:
  provider: "google-gtag"
  google:
    tracking_id: G-K8Q8D7HLYB
    anonymize_ip: true

author:
  name: "Manuel Ferreira-Junior"
  avatar: "https://avatars.githubusercontent.com/u/53409857?s=400&u=467cf21030038ff9b41db6d28783f125b12a6d73&v=4"
  bio: "Machine Learning Engineer, researcher, and author of work on CLAIRE and Beta-IRT."
  location: "João Pessoa, Brazil"
  links: []

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Manuelfjr"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/manuefjr"

include:
  - .htaccess
  - _pages
  - _posts

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - node_modules
  - poetry.lock
  - poetry.toml
  - pyproject.toml
  - package.json
  - package-lock.json
  - README.md
  - CHANGELOG.md
  - Rakefile
  - Gemfile
  - Gemfile.lock
  - banner.js
  - docs
  - test
  - midias
  - _site

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: true

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..3
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
paginate: 8
paginate_path: /writing/page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
